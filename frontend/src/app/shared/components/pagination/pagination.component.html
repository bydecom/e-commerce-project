<div class="flex items-center justify-center gap-4 py-4 text-sm">
  <button
    type="button"
    [ngClass]="
      variant === 'shop'
        ? 'rounded-full border-0 bg-white px-5 py-2 font-medium text-slate-700 shadow-md ring-1 ring-slate-200/80 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-40'
        : 'rounded border px-3 py-1 disabled:opacity-40'
    "
    [disabled]="page <= 1"
    (click)="prev()"
  >
    Previous
  </button>
  <span [ngClass]="variant === 'shop' ? 'text-slate-600' : 'text-gray-600'">
    Page {{ page }} / {{ totalPages }}
  </span>
  <button
    type="button"
    [ngClass]="
      variant === 'shop'
        ? 'rounded-full border-0 bg-indigo-600 px-5 py-2 font-medium text-white shadow-md transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-40'
        : 'rounded border px-3 py-1 disabled:opacity-40'
    "
    [disabled]="page >= totalPages"
    (click)="next()"
  >
    Next
  </button>
</div>
