<article
  class="group flex flex-col overflow-hidden rounded-2xl bg-white shadow-md ring-1 ring-slate-200/60 transition duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:ring-indigo-200/80"
>
  <div class="relative h-40 w-full overflow-hidden bg-gradient-to-br from-slate-100 to-slate-200 sm:h-48 lg:h-52">
    @if (product.imageUrl) {
      <img
        [src]="product.imageUrl"
        [alt]="product.name"
        class="h-full w-full object-contain p-2 transition duration-300 group-hover:scale-[1.02]"
      />
    } @else {
      <div class="flex h-full items-center justify-center text-sm text-slate-400">No photo yet</div>
    }
  </div>
  <div class="flex flex-1 flex-col p-5">
    @if (product.category; as cat) {
      <p class="text-xs font-medium uppercase tracking-wide text-indigo-700/90">{{ cat.name }}</p>
    }
    <h3 class="mt-1 line-clamp-2 min-h-[2.75rem] text-base font-semibold leading-snug text-slate-900">
      {{ product.name }}
    </h3>
    <p class="py-2 text-xl font-bold text-indigo-600">{{ product.price | currencyVnd }}</p>
    <a
      [routerLink]="['/products', product.id]"
      class="mt-auto inline-flex items-center justify-center rounded-xl bg-indigo-600 px-4 py-2.5 text-center text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700"
    >
      View details
    </a>
  </div>
</article>
