<article
  class="group flex flex-col overflow-hidden rounded-2xl bg-white shadow-md ring-1 ring-stone-200/60 transition duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:ring-emerald-200/80"
>
  <div class="relative aspect-square bg-gradient-to-br from-stone-100 to-stone-200">
    @if (product.imageUrl) {
      <img
        [src]="product.imageUrl"
        [alt]="product.name"
        class="h-full w-full object-cover transition duration-300 group-hover:scale-[1.02]"
      />
    } @else {
      <div class="flex h-full items-center justify-center text-sm text-stone-400">No photo yet</div>
    }
  </div>
  <div class="flex flex-1 flex-col p-5">
    @if (product.category; as cat) {
      <p class="text-xs font-medium uppercase tracking-wide text-emerald-700/90">{{ cat.name }}</p>
    }
    <h3 class="mt-1 line-clamp-2 text-base font-semibold leading-snug text-stone-900">{{ product.name }}</h3>
    <p class="mt-3 text-xl font-bold text-emerald-800">{{ product.price | currencyVnd }}</p>
    <a
      [routerLink]="['/products', product.id]"
      class="mt-auto inline-flex items-center justify-center rounded-xl bg-emerald-600 px-4 py-2.5 text-center text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700"
    >
      View details
    </a>
  </div>
</article>
