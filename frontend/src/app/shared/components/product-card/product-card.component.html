<article class="flex flex-col overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm transition hover:shadow-md">
  <div class="aspect-square bg-gray-100">
    @if (product.imageUrl) {
      <img [src]="product.imageUrl" [alt]="product.name" class="h-full w-full object-cover" />
    } @else {
      <div class="flex h-full items-center justify-center text-gray-400">No image</div>
    }
  </div>
  <div class="flex flex-1 flex-col p-4">
    <h3 class="line-clamp-2 font-semibold text-gray-900">{{ product.name }}</h3>
    <p class="mt-2 text-lg font-bold text-blue-700">{{ product.price | currencyVnd }}</p>
    <a
      [routerLink]="['/products', product.id]"
      class="mt-auto inline-block rounded-lg bg-blue-600 px-4 py-2 text-center text-sm text-white hover:bg-blue-700"
    >
      View
    </a>
  </div>
</article>
