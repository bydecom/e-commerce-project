smoke-test:
  name: 🏥 Smoke Test
  runs-on: ubuntu-latest
  needs: test-backend
  if: github.event_name == 'pull_request'
  environment: Production  # ← thêm dòng này
  steps:
    - name: Check CloudFront FE
      run: |
        curl -f https://d7ozoo9vtkn42.cloudfront.net || exit 1
        echo "✅ Frontend OK"

    - name: Check BE Health
      run: |
        curl -f http://${{ secrets.EC2_HOST }}/api/health || exit 1
        echo "✅ Backend OK"