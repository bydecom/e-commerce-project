services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    command: redis-server --requirepass redissecret
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: ecommerce_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: ecommerce_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ecommerce_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:redissecret
    ports:
      - "8082:8081"
    depends_on:
      - redis
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: ecommerce_portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secret123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ecommerce_qdrant
    ports:
      - "6333:6333" 
      - "6334:6334" 
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio
    container_name: ecommerce_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    command: server /data --console-address ":9003" --address ":9002"
    ports:
      - "9002:9002"
      - "9003:9003"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-create-bucket:
    image: quay.io/minio/mc
    container_name: ecommerce_minio_mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9002 admin password123;
      /usr/bin/mc mb myminio/ecommerce-products || true;
      /usr/bin/mc anonymous set download myminio/ecommerce-products;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  portainer_data:
  rabbitmq_data:
  qdrant_data:
  minio_data:
